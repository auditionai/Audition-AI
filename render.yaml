services:
  - type: web
    name: audition-web
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm run render:web
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_R2_ENDPOINT
        sync: false
      - key: VITE_R2_ACCESS_KEY_ID
        sync: false
      - key: VITE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: VITE_R2_BUCKET_NAME
        sync: false
      - key: VITE_R2_PUBLIC_URL
        sync: false
      - key: VITE_CAULENHAU_SUPABASE_URL
        sync: false
      - key: VITE_CAULENHAU_SUPABASE_ANON_KEY
        sync: false
      - key: CAULENHAU_SUPABASE_URL
        sync: false
      - key: CAULENHAU_SUPABASE_ANON_KEY
        sync: false
      - key: TST_API_KEY
        sync: false
      - key: PAYMENT_GATEWAY
        value: sepay
      - key: SEPAY_ENV
        value: production
      - key: SEPAY_MERCHANT_ID
        sync: false
      - key: SEPAY_SECRET_KEY
        sync: false
      - key: SEPAY_API_TOKEN
        sync: false
      - key: SEPAY_PAYMENT_METHOD
        value: BANK_TRANSFER
      - key: SEPAY_SUCCESS_URL
        sync: false
      - key: SEPAY_ERROR_URL
        sync: false
      - key: SEPAY_CANCEL_URL
        sync: false
      - key: SEPAY_IPN_URL
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_SECRET
        sync: false
      - key: QUEUE_WORKER_MODE
        value: dedicated
      - key: DISABLE_BACKGROUND_QUEUE_TRIGGER
        value: "true"

  - type: worker
    name: audition-queue-worker
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci
    startCommand: npm run render:queue-worker
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TST_API_KEY
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_SECRET
        sync: false

  - type: cron
    name: audition-queue-watchdog
    runtime: node
    plan: starter
    region: singapore
    schedule: "*/1 * * * *"
    buildCommand: npm ci
    startCommand: npm run render:queue-watchdog
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TST_API_KEY
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_SECRET
        sync: false

  - type: cron
    name: audition-sepay-watchdog
    runtime: node
    plan: starter
    region: singapore
    schedule: "*/1 * * * *"
    buildCommand: npm ci
    startCommand: npm run render:sepay-watchdog
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SEPAY_ENV
        value: production
      - key: SEPAY_MERCHANT_ID
        sync: false
      - key: SEPAY_SECRET_KEY
        sync: false
      - key: SEPAY_API_TOKEN
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_NOTIFY_WEBHOOK_SECRET
        sync: false
