[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  command = "npm run dev:vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  functions = "netlify/functions"

# Chuyển hướng các request API vào Netlify Functions
[[redirects]]
  from = "/api/get-vertex-token"
  to = "/.netlify/functions/get-vertex-token"
  status = 200

